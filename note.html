<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>筆記檢視 — Vet_note</title>
<style>
  :root{
    --bg:#f6f7fb; --card:#ffffff; --ink:#1f2430; --muted:#6b7280;
    --line:#e5e7eb; --accent:#3b5bdb; --accent-soft:#eef1ff;
    --tag:#eef2ff; --tag-ink:#3b5bdb;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"PingFang TC","Microsoft JhengHei",Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.7;
  }
  .topbar{
    position:sticky; top:0; background:var(--bg); border-bottom:1px solid var(--line);
    padding:14px 16px; display:flex; align-items:center; gap:10px; z-index:10;
  }
  .topbar a{
    color:var(--accent); text-decoration:none; font-size:14px; font-weight:600;
  }
  main{ max-width:760px; margin:0 auto; padding:24px 20px 80px; }

  #meta{ margin-bottom:20px; }
  #meta .tags{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  #meta .tag{ background:var(--tag); color:var(--tag-ink); font-size:12px; padding:3px 10px; border-radius:999px; }
  #meta .field{ font-size:13px; color:var(--muted); margin:2px 0; }

  #content{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:28px 30px;
  }
  #content h1{ font-size:22px; margin:0 0 16px; }
  #content h2{ font-size:17px; margin:28px 0 10px; padding-top:10px; border-top:1px solid var(--line); }
  #content h2:first-child{ border-top:none; padding-top:0; }
  #content h3{ font-size:15px; margin:18px 0 8px; color:var(--accent); }
  #content p{ margin:0 0 12px; font-size:15px; }
  #content ul, #content ol{ margin:0 0 12px; padding-left:1.4em; font-size:15px; }
  #content li{ margin:4px 0; }
  #content table{ width:100%; border-collapse:collapse; margin:12px 0; font-size:13.5px; }
  #content th, #content td{ border:1px solid var(--line); padding:8px 10px; text-align:left; }
  #content th{ background:var(--accent-soft); color:var(--accent); }
  #content code{ background:var(--accent-soft); color:var(--accent); padding:1px 6px; border-radius:4px; font-size:13px; }
  #content blockquote{
    margin:0 0 12px; padding:8px 14px; border-left:3px solid var(--accent);
    background:var(--accent-soft); color:var(--text-secondary); font-size:14px; border-radius:0 8px 8px 0;
  }
  #content a{ color:var(--accent); }
  #content strong{ color:var(--ink); }
  #content hr{ border:none; border-top:1px solid var(--line); margin:20px 0; }

  .state{ text-align:center; color:var(--muted); font-size:14px; padding:60px 20px; }
  .state a{ color:var(--accent); }

  #content mark.user-hl{ background:#fff3a0; color:var(--ink); padding:0 2px; border-radius:2px; }

  #hl-btn{
    position:absolute; display:none; background:var(--ink); color:#fff; font-size:12.5px;
    padding:7px 12px; border-radius:8px; border:none; z-index:50; cursor:pointer;
  }

  .mynote-box{
    background:#fffbe8; border:1px solid #f0e0a0; border-radius:12px;
    padding:12px 14px; margin-bottom:16px;
  }
  .mynote-box .label{ font-size:12px; color:var(--muted); margin-bottom:6px; display:flex; justify-content:space-between; }
  .mynote-box textarea{
    width:100%; min-height:60px; border:none; background:transparent; resize:vertical;
    font-family:inherit; font-size:14px; color:var(--ink); outline:none; padding:0;
  }
  .mynote-box .clear-link{ color:var(--muted); text-decoration:underline; cursor:pointer; font-size:11px; }
</style>
</head>
<body>

<div class="topbar">
  <a href="首頁.html">← 返回首頁</a>
  <span style="font-size:12px; color:var(--muted);">選字可醒目標記／下方可寫個人筆記（只存在這台裝置）</span>
</div>

<main>
  <div class="mynote-box">
    <div class="label"><span>🗒️ 我的筆記（僅存在這台裝置，不會同步／不會分享）</span><span class="clear-link" id="clear-mynote">清空</span></div>
    <textarea id="mynote" placeholder="在這裡寫下你自己的想法、提醒、還沒問完的問題..."></textarea>
  </div>
  <div id="meta"></div>
  <div id="content"><div class="state">載入中...</div></div>
</main>

<button id="hl-btn">醒目標記</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
<script>
const RAW_BASE = "https://raw.githubusercontent.com/yc-vetalk/yc-dvm-notes/main/";

function parseFrontmatter(text){
  const m = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
  if(!m) return { meta:{}, body:text };
  const meta = {};
  m[1].split("\n").forEach(line => {
    const idx = line.indexOf(":");
    if(idx === -1) return;
    const key = line.slice(0, idx).trim();
    let val = line.slice(idx+1).trim();
    meta[key] = val;
  });
  return { meta, body: m[2] };
}

function renderMeta(meta, title){
  const metaEl = document.getElementById("meta");
  let html = `<h1 style="font-size:20px; margin:0 0 6px;">${title}</h1>`;
  const fieldNames = { "物種":"物種", "分類":"分類", "適用情境":"適用情境", "系統":"系統", "日期建立":"建立日期", "狀態":"狀態" };
  Object.keys(fieldNames).forEach(k => {
    if(meta[k]) html += `<div class="field">${fieldNames[k]}：${meta[k].replace(/[\[\]]/g,"")}</div>`;
  });
  let tags = [];
  if(meta["關鍵字"]) tags = meta["關鍵字"].replace(/[\[\]]/g,"").split(",").map(s=>s.trim()).filter(Boolean);
  if(tags.length) html += `<div class="tags">${tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>`;
  metaEl.innerHTML = html;
}

// 把筆記內文裡的相對連結（如 ../Dexmedetomidine_使用時機.md、../../../01_藥物筆記/藥物資料庫.xlsx）
// 換算成相對於「這篇筆記在 repo 裡的實際目錄」的絕對路徑，再套用跟首頁一樣的轉址規則
function resolveRelativeLink(currentPath, href){
  if(/^https?:\/\//.test(href) || href.startsWith("#")) return null; // 外部連結/錨點不處理
  const dirSegs = currentPath.split("/").slice(0, -1);
  const hrefSegs = href.split("/");
  const stack = [...dirSegs];
  for(const seg of hrefSegs){
    if(seg === "." || seg === "") continue;
    if(seg === "..") stack.pop();
    else stack.push(seg);
  }
  const resolved = stack.join("/");
  if(resolved === "01_藥物筆記/藥物資料庫.xlsx") return "drug.html";
  if(resolved.endsWith(".md")) return "note.html?path=" + encodeURIComponent(resolved);
  return RAW_BASE + resolved.split("/").map(encodeURIComponent).join("/");
}

function fixRelativeLinks(container, currentPath){
  container.querySelectorAll("a[href]").forEach(a => {
    const resolved = resolveRelativeLink(currentPath, a.getAttribute("href"));
    if(resolved){ a.setAttribute("href", resolved); a.setAttribute("target", "_blank"); }
  });
}

// ---- 個人標記／個人筆記：只存在這台裝置的 localStorage，不會 push 回 GitHub ----
function hlKey(path){ return "vetnote_hl_" + path; }
function noteKey(path){ return "vetnote_mynote_" + path; }

function getHighlights(path){
  try{ return JSON.parse(localStorage.getItem(hlKey(path)) || "[]"); }catch(e){ return []; }
}
function saveHighlight(path, text){
  const list = getHighlights(path);
  if(!list.includes(text)){ list.push(text); localStorage.setItem(hlKey(path), JSON.stringify(list)); }
}

// 在 container 內找出所有等於 text 的文字節點片段，包成 <mark>
function wrapTextInContainer(container, text){
  if(!text) return;
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
    acceptNode(node){
      return node.parentElement.closest("mark.user-hl") ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes = [];
  let n;
  while((n = walker.nextNode())) nodes.push(n);
  nodes.forEach(node => {
    const idx = node.nodeValue.indexOf(text);
    if(idx === -1) return;
    const range = document.createRange();
    range.setStart(node, idx);
    range.setEnd(node, idx + text.length);
    const mark = document.createElement("mark");
    mark.className = "user-hl";
    try{ range.surroundContents(mark); }catch(e){ /* 跨節點選取，略過 */ }
  });
}

function applyStoredHighlights(container, path){
  getHighlights(path).forEach(text => wrapTextInContainer(container, text));
}

function setupHighlighting(container, path){
  const btn = document.getElementById("hl-btn");
  let pendingText = "";
  function hideBtn(){ btn.style.display = "none"; }
  function showBtnForSelection(){
    const sel = window.getSelection();
    const text = sel.toString().trim();
    if(!text || sel.rangeCount === 0 || !container.contains(sel.anchorNode)){ hideBtn(); return; }
    pendingText = text;
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    btn.style.top = (window.scrollY + rect.top - 40) + "px";
    btn.style.left = (window.scrollX + rect.left) + "px";
    btn.style.display = "block";
  }
  document.addEventListener("mouseup", e => { if(e.target !== btn) setTimeout(showBtnForSelection, 0); });
  document.addEventListener("touchend", e => { if(e.target !== btn) setTimeout(showBtnForSelection, 0); });
  btn.addEventListener("click", () => {
    if(pendingText){
      saveHighlight(path, pendingText);
      wrapTextInContainer(container, pendingText);
      window.getSelection().removeAllRanges();
    }
    hideBtn();
  });
}

function setupMyNote(path){
  const ta = document.getElementById("mynote");
  ta.value = localStorage.getItem(noteKey(path)) || "";
  ta.addEventListener("input", () => localStorage.setItem(noteKey(path), ta.value));
  document.getElementById("clear-mynote").addEventListener("click", () => {
    if(confirm("清空這篇筆記的個人筆記？")){ ta.value = ""; localStorage.removeItem(noteKey(path)); }
  });
}

async function load(){
  const params = new URLSearchParams(location.search);
  const path = params.get("path");
  const contentEl = document.getElementById("content");
  if(!path){
    contentEl.innerHTML = `<div class="state">沒有指定筆記路徑。<br><a href="首頁.html">回首頁</a></div>`;
    return;
  }
  setupMyNote(path);
  const url = RAW_BASE + path.split("/").map(encodeURIComponent).join("/") + "?_=" + Date.now();
  try{
    const res = await fetch(url, { cache: "no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const { meta, body } = parseFrontmatter(text);
    const filename = decodeURIComponent(path.split("/").pop()).replace(/\.md$/, "");
    document.title = filename + " — Vet_note";
    renderMeta(meta, meta["主題"] || meta["藥名"] || filename);
    contentEl.innerHTML = marked.parse(body);
    fixRelativeLinks(contentEl, path);
    applyStoredHighlights(contentEl, path);
    setupHighlighting(contentEl, path);
  }catch(err){
    contentEl.innerHTML = `<div class="state">找不到這篇筆記，或讀取失敗。<br><a href="首頁.html">回首頁</a></div>`;
  }
}
load();
</script>

</body>
</html>
