<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>筆記檢視 — Vet_note</title>
<style>
  :root{
    --bg:#f6f7fb; --card:#ffffff; --ink:#1f2430; --muted:#6b7280;
    --line:#e5e7eb; --accent:#3b5bdb; --accent-soft:#eef1ff;
    --tag:#eef2ff; --tag-ink:#3b5bdb;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"PingFang TC","Microsoft JhengHei",Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.7;
  }
  .topbar{
    position:sticky; top:0; background:var(--bg); border-bottom:1px solid var(--line);
    padding:14px 16px; display:flex; align-items:center; gap:10px; z-index:10;
  }
  .topbar a{
    color:var(--accent); text-decoration:none; font-size:14px; font-weight:600;
  }
  main{ max-width:760px; margin:0 auto; padding:24px 20px 80px; }

  #meta{ margin-bottom:20px; }
  #meta .tags{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  #meta .tag{ background:var(--tag); color:var(--tag-ink); font-size:12px; padding:3px 10px; border-radius:999px; }
  #meta .field{ font-size:13px; color:var(--muted); margin:2px 0; }

  #content{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:28px 30px;
  }
  #content h1{ font-size:22px; margin:0 0 16px; }
  #content h2{ font-size:17px; margin:28px 0 10px; padding-top:10px; border-top:1px solid var(--line); }
  #content h2:first-child{ border-top:none; padding-top:0; }
  #content h3{ font-size:15px; margin:18px 0 8px; color:var(--accent); }
  #content p{ margin:0 0 12px; font-size:15px; }
  #content ul, #content ol{ margin:0 0 12px; padding-left:1.4em; font-size:15px; }
  #content li{ margin:4px 0; }
  #content table{ width:100%; border-collapse:collapse; margin:12px 0; font-size:13.5px; }
  #content th, #content td{ border:1px solid var(--line); padding:8px 10px; text-align:left; }
  #content th{ background:var(--accent-soft); color:var(--accent); }
  #content code{ background:var(--accent-soft); color:var(--accent); padding:1px 6px; border-radius:4px; font-size:13px; }
  #content blockquote{
    margin:0 0 12px; padding:8px 14px; border-left:3px solid var(--accent);
    background:var(--accent-soft); color:var(--text-secondary); font-size:14px; border-radius:0 8px 8px 0;
  }
  #content a{ color:var(--accent); }
  #content strong{ color:var(--ink); }
  #content hr{ border:none; border-top:1px solid var(--line); margin:20px 0; }

  .state{ text-align:center; color:var(--muted); font-size:14px; padding:60px 20px; }
  .state a{ color:var(--accent); }

  #content mark.user-hl{ background:#fff3a0; color:var(--ink); padding:0 2px; border-radius:2px; }

  #hl-btn{
    position:absolute; display:none; background:var(--ink); color:#fff; font-size:12.5px;
    padding:7px 12px; border-radius:8px; border:none; z-index:50; cursor:pointer;
  }

  .mynote-box{
    background:#fffbe8; border:1px solid #f0e0a0; border-radius:12px;
    padding:12px 14px; margin-bottom:16px;
  }
  .mynote-box .label{ font-size:12px; color:var(--muted); margin-bottom:6px; display:flex; justify-content:space-between; }
  .mynote-box textarea{
    width:100%; min-height:60px; border:none; background:transparent; resize:vertical;
    font-family:inherit; font-size:14px; color:var(--ink); outline:none; padding:0;
  }
  .mynote-box .clear-link{ color:var(--muted); text-decoration:underline; cursor:pointer; font-size:11px; }

  .sync-bar{ font-size:12px; color:var(--muted); display:flex; align-items:center; gap:8px; margin-left:auto; }
  .sync-bar button{
    font-size:12px; border:1px solid var(--line); background:var(--card); border-radius:8px;
    padding:4px 10px; cursor:pointer; color:var(--accent);
  }
  .sync-status.ok{ color:#1e7e34; }
  .sync-status.err{ color:#c0392b; }

  .auth-box{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:14px 16px; margin-bottom:16px; font-size:13px; display:none;
  }
  .auth-box.show{ display:block; }
  .auth-box input{
    width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--line);
    font-size:13px; margin:8px 0; box-sizing:border-box;
  }
  .auth-box .warn{ color:#b8860b; font-size:12px; }
</style>
</head>
<body>

<div class="topbar">
  <a href="首頁.html">← 返回首頁</a>
  <span style="font-size:12px; color:var(--muted);">選字可醒目標記</span>
  <div class="sync-bar">
    <span id="sync-status" class="sync-status"></span>
    <button id="auth-toggle">🔑 同步設定</button>
  </div>
</div>

<main>
  <div class="auth-box" id="auth-box">
    <div><b>讓筆記/標記同步到所有裝置</b></div>
    <div style="margin:8px 0;">1. 到 GitHub 建立一個 <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">Fine-grained token</a>：Repository access 選 <code>yc-dvm-notes</code>，Permissions 開 <code>Contents: Read and write</code>。<br>2. 貼在下面，只會存在這台裝置，不會傳給任何人（除了你自己的 GitHub）。</div>
    <input type="password" id="pat-input" placeholder="貼上 GitHub token（github_pat_... 或 ghp_...）">
    <button id="pat-save">儲存並連線</button>
    <button id="pat-clear">登出</button>
    <div class="warn">⚠️ 這個 repo 是 Public，同步後的筆記/標記任何人拿到連結都看得到，請勿寫入敏感資訊。</div>
  </div>

  <div class="mynote-box">
    <div class="label"><span>🗒️ 我的筆記</span><span class="clear-link" id="clear-mynote">清空</span></div>
    <textarea id="mynote" placeholder="在這裡寫下你自己的想法、提醒、還沒問完的問題..."></textarea>
  </div>
  <div id="meta"></div>
  <div id="content"><div class="state">載入中...</div></div>
</main>

<button id="hl-btn">醒目標記</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
<script>
const RAW_BASE = "https://raw.githubusercontent.com/yc-vetalk/yc-dvm-notes/main/";

function parseFrontmatter(text){
  const m = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
  if(!m) return { meta:{}, body:text };
  const meta = {};
  m[1].split("\n").forEach(line => {
    const idx = line.indexOf(":");
    if(idx === -1) return;
    const key = line.slice(0, idx).trim();
    let val = line.slice(idx+1).trim();
    meta[key] = val;
  });
  return { meta, body: m[2] };
}

function renderMeta(meta, title){
  const metaEl = document.getElementById("meta");
  let html = `<h1 style="font-size:20px; margin:0 0 6px;">${title}</h1>`;
  const fieldNames = { "物種":"物種", "分類":"分類", "適用情境":"適用情境", "系統":"系統", "日期建立":"建立日期", "狀態":"狀態" };
  Object.keys(fieldNames).forEach(k => {
    if(meta[k]) html += `<div class="field">${fieldNames[k]}：${meta[k].replace(/[\[\]]/g,"")}</div>`;
  });
  let tags = [];
  if(meta["關鍵字"]) tags = meta["關鍵字"].replace(/[\[\]]/g,"").split(",").map(s=>s.trim()).filter(Boolean);
  if(tags.length) html += `<div class="tags">${tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>`;
  metaEl.innerHTML = html;
}

// 把筆記內文裡的相對連結（如 ../Dexmedetomidine_使用時機.md、../../../01_藥物筆記/藥物資料庫.xlsx）
// 換算成相對於「這篇筆記在 repo 裡的實際目錄」的絕對路徑，再套用跟首頁一樣的轉址規則
function resolveRelativeLink(currentPath, href){
  if(/^https?:\/\//.test(href) || href.startsWith("#")) return null; // 外部連結/錨點不處理
  const dirSegs = currentPath.split("/").slice(0, -1);
  const hrefSegs = href.split("/");
  const stack = [...dirSegs];
  for(const seg of hrefSegs){
    if(seg === "." || seg === "") continue;
    if(seg === "..") stack.pop();
    else stack.push(seg);
  }
  const resolved = stack.join("/");
  if(resolved === "01_藥物筆記/藥物資料庫.xlsx") return "drug.html";
  if(resolved.endsWith(".md")) return "note.html?path=" + encodeURIComponent(resolved);
  return RAW_BASE + resolved.split("/").map(encodeURIComponent).join("/");
}

function fixRelativeLinks(container, currentPath){
  container.querySelectorAll("a[href]").forEach(a => {
    const resolved = resolveRelativeLink(currentPath, a.getAttribute("href"));
    if(resolved){ a.setAttribute("href", resolved); a.setAttribute("target", "_blank"); }
  });
}

// ---- 個人標記／個人筆記：先寫 localStorage 當即時快取，若已連線 GitHub 則同步到 _personal/ 資料夾（public repo！） ----
const REPO = "yc-vetalk/yc-dvm-notes";
const localKey = path => "vetnote_personal_" + path;

function getToken(){ return localStorage.getItem("gh_pat") || ""; }
function setSyncStatus(state, text){
  const el = document.getElementById("sync-status");
  el.className = "sync-status " + (state || "");
  el.textContent = text || "";
}

function personalApiPath(path){
  return "_personal/" + path.replace(/\.md$/, ".json");
}

async function fetchRemotePersonal(path){
  const token = getToken();
  if(!token) return null;
  const apiPath = personalApiPath(path).split("/").map(encodeURIComponent).join("/");
  try{
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${apiPath}`, {
      headers: { Authorization: "token " + token, Accept: "application/vnd.github+json" }
    });
    if(res.status === 404) return { data: null, sha: null };
    if(!res.ok) throw new Error("HTTP " + res.status);
    const j = await res.json();
    const decoded = decodeURIComponent(escape(atob(j.content.replace(/\n/g, ""))));
    return { data: JSON.parse(decoded), sha: j.sha };
  }catch(e){
    setSyncStatus("err", "讀取同步資料失敗");
    return null;
  }
}

function utf8ToBase64(str){
  const bytes = new TextEncoder().encode(str);
  let binary = "";
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}

let currentSha = null;
async function saveRemotePersonal(path, dataObj){
  const token = getToken();
  if(!token) return;
  setSyncStatus("", "同步中...");
  const apiPath = personalApiPath(path).split("/").map(encodeURIComponent).join("/");
  const body = {
    message: "sync personal notes: " + path,
    content: utf8ToBase64(JSON.stringify(dataObj, null, 2)),
    branch: "main"
  };
  if(currentSha) body.sha = currentSha;
  try{
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${apiPath}`, {
      method: "PUT",
      headers: { Authorization: "token " + token, Accept: "application/vnd.github+json", "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const j = await res.json();
    currentSha = j.content.sha;
    setSyncStatus("ok", "已同步 ✓");
  }catch(e){
    setSyncStatus("err", "同步失敗（token 是否有 Contents 寫入權限？）");
  }
}

let personalData = { myNote: "", highlights: [] };
let saveTimer = null;
function schedulePersonalSave(path){
  localStorage.setItem(localKey(path), JSON.stringify(personalData));
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveRemotePersonal(path, personalData), 1200);
}

async function loadPersonalData(path){
  const local = localStorage.getItem(localKey(path));
  if(local){ try{ personalData = JSON.parse(local); }catch(e){} }
  if(getToken()){
    setSyncStatus("", "讀取同步資料中...");
    const remote = await fetchRemotePersonal(path);
    if(remote){
      currentSha = remote.sha;
      if(remote.data){ personalData = remote.data; localStorage.setItem(localKey(path), JSON.stringify(personalData)); }
      setSyncStatus("ok", "已連線同步");
    }
  } else {
    setSyncStatus("", "未連線同步（僅存本機）");
  }
}

function setupAuthBox(path){
  const box = document.getElementById("auth-box");
  const toggle = document.getElementById("auth-toggle");
  toggle.addEventListener("click", () => box.classList.toggle("show"));
  document.getElementById("pat-input").value = getToken();
  document.getElementById("pat-save").addEventListener("click", async () => {
    const val = document.getElementById("pat-input").value.trim();
    if(val){ localStorage.setItem("gh_pat", val); await loadPersonalData(path); renderMyNoteFromData(); reapplyHighlights(); }
  });
  document.getElementById("pat-clear").addEventListener("click", () => {
    localStorage.removeItem("gh_pat");
    setSyncStatus("", "未連線同步（僅存本機）");
  });
}

// 在 container 內找出所有等於 text 的文字節點片段，包成 <mark>
function wrapTextInContainer(container, text){
  if(!text) return;
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
    acceptNode(node){
      return node.parentElement.closest("mark.user-hl") ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes = [];
  let n;
  while((n = walker.nextNode())) nodes.push(n);
  nodes.forEach(node => {
    const idx = node.nodeValue.indexOf(text);
    if(idx === -1) return;
    const range = document.createRange();
    range.setStart(node, idx);
    range.setEnd(node, idx + text.length);
    const mark = document.createElement("mark");
    mark.className = "user-hl";
    try{ range.surroundContents(mark); }catch(e){ /* 跨節點選取，略過 */ }
  });
}

let contentElRef = null;
function reapplyHighlights(){
  if(!contentElRef) return;
  contentElRef.querySelectorAll("mark.user-hl").forEach(m => m.replaceWith(document.createTextNode(m.textContent)));
  contentElRef.normalize();
  (personalData.highlights || []).forEach(text => wrapTextInContainer(contentElRef, text));
}

function renderMyNoteFromData(){
  document.getElementById("mynote").value = personalData.myNote || "";
}

function setupHighlighting(container, path){
  contentElRef = container;
  const btn = document.getElementById("hl-btn");
  let pendingText = "";
  function hideBtn(){ btn.style.display = "none"; }
  function showBtnForSelection(){
    const sel = window.getSelection();
    const text = sel.toString().trim();
    if(!text || sel.rangeCount === 0 || !container.contains(sel.anchorNode)){ hideBtn(); return; }
    pendingText = text;
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    btn.style.top = (window.scrollY + rect.top - 40) + "px";
    btn.style.left = (window.scrollX + rect.left) + "px";
    btn.style.display = "block";
  }
  document.addEventListener("mouseup", e => { if(e.target !== btn) setTimeout(showBtnForSelection, 0); });
  document.addEventListener("touchend", e => { if(e.target !== btn) setTimeout(showBtnForSelection, 0); });
  btn.addEventListener("click", () => {
    if(pendingText){
      if(!personalData.highlights) personalData.highlights = [];
      if(!personalData.highlights.includes(pendingText)) personalData.highlights.push(pendingText);
      wrapTextInContainer(container, pendingText);
      window.getSelection().removeAllRanges();
      schedulePersonalSave(path);
    }
    hideBtn();
  });
}

function setupMyNote(path){
  const ta = document.getElementById("mynote");
  ta.addEventListener("input", () => {
    personalData.myNote = ta.value;
    schedulePersonalSave(path);
  });
  document.getElementById("clear-mynote").addEventListener("click", () => {
    if(confirm("清空這篇筆記的個人筆記與標記？")){
      ta.value = "";
      personalData = { myNote: "", highlights: [] };
      schedulePersonalSave(path);
      reapplyHighlights();
    }
  });
}

async function load(){
  const params = new URLSearchParams(location.search);
  const path = params.get("path");
  const contentEl = document.getElementById("content");
  if(!path){
    contentEl.innerHTML = `<div class="state">沒有指定筆記路徑。<br><a href="首頁.html">回首頁</a></div>`;
    return;
  }
  setupAuthBox(path);
  setupMyNote(path);
  await loadPersonalData(path);
  renderMyNoteFromData();
  const url = RAW_BASE + path.split("/").map(encodeURIComponent).join("/") + "?_=" + Date.now();
  try{
    const res = await fetch(url, { cache: "no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const { meta, body } = parseFrontmatter(text);
    const filename = decodeURIComponent(path.split("/").pop()).replace(/\.md$/, "");
    document.title = filename + " — Vet_note";
    renderMeta(meta, meta["主題"] || meta["藥名"] || filename);
    contentEl.innerHTML = marked.parse(body);
    fixRelativeLinks(contentEl, path);
    setupHighlighting(contentEl, path);
    reapplyHighlights();
  }catch(err){
    contentEl.innerHTML = `<div class="state">找不到這篇筆記，或讀取失敗。<br><a href="首頁.html">回首頁</a></div>`;
  }
}
load();
</script>

</body>
</html>
