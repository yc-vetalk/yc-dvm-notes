<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Vet_note 知識庫入口</title>
<style>
  :root{
    --bg:#f6f7fb; --card:#ffffff; --ink:#1f2430; --muted:#6b7280;
    --line:#e5e7eb; --accent:#3b5bdb; --accent-soft:#eef1ff;
    --tag:#eef2ff; --tag-ink:#3b5bdb;
    --status-active:#e6f4ea; --status-active-ink:#1e7e34;
    --status-done:#eceff1; --status-done-ink:#607d8b;
    --status-surgery:#fff4e5; --status-surgery-ink:#b8860b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"PingFang TC","Microsoft JhengHei",Arial,sans-serif;
    background:var(--bg); color:var(--ink);
  }
  header{ padding:30px 24px 16px; text-align:center; position:relative; }
  header h1{ margin:0 0 6px; font-size:26px; }
  header p{ margin:0; color:var(--muted); font-size:14px; }
  .new-link{
    position:absolute; top:30px; right:24px; background:var(--accent); color:#fff;
    text-decoration:none; font-size:13px; font-weight:600; padding:8px 14px; border-radius:999px;
  }

  .search-wrap{ max-width:640px; margin:20px auto 8px; padding:0 16px; }
  #search{
    width:100%; padding:12px 16px; border-radius:10px; border:1px solid var(--line);
    font-size:15px; background:var(--card);
  }
  #search:focus{ outline:2px solid var(--accent); }

  main{ max-width:1040px; margin:0 auto; padding:12px 16px 60px; }

  .major-section{
    margin-top:38px; background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px 22px;
  }
  .major-section > h2{ font-size:17px; margin:0 0 4px; }
  .major-section > .major-desc{ font-size:12px; color:var(--muted); margin:0 0 16px; }

  .subcat{ margin-top:16px; }
  .subcat:first-of-type{ margin-top:4px; }
  .subcat-label{
    font-size:12px; font-weight:600; color:var(--accent); text-transform:none;
    margin-bottom:8px; display:flex; align-items:center; gap:6px;
  }
  .subcat-label .n{ color:var(--muted); font-weight:normal; }

  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; }

  .card{
    background:var(--bg); border:1px solid var(--line); border-radius:10px;
    padding:13px 14px; transition:box-shadow .15s, transform .15s; text-decoration:none; color:inherit; display:block;
  }
  .card:hover{ box-shadow:0 6px 16px rgba(0,0,0,.07); transform:translateY(-1px); }
  .card .title{ font-weight:600; font-size:14px; margin-bottom:5px; }
  .card .desc{ font-size:12.5px; color:var(--muted); margin-bottom:8px; line-height:1.5; }
  .tags{ display:flex; flex-wrap:wrap; gap:5px; }
  .tag{ background:var(--tag); color:var(--tag-ink); font-size:10.5px; padding:2px 7px; border-radius:999px; }

  .empty-hint{ color:var(--muted); font-size:12.5px; padding:10px 4px; }

  table{ width:100%; border-collapse:collapse; background:var(--bg); border-radius:10px; overflow:hidden; border:1px solid var(--line); }
  th,td{ text-align:left; padding:10px 12px; font-size:13px; border-bottom:1px solid var(--line); }
  th{ background:var(--accent-soft); color:var(--accent); font-weight:600; }
  tr:last-child td{ border-bottom:none; }
  .empty-row td{ color:var(--muted); font-style:italic; }
  .status{ padding:2px 10px; border-radius:999px; font-size:12px; }
  .status.追蹤中{ background:var(--status-active); color:var(--status-active-ink); }
  .status.已結案{ background:var(--status-done); color:var(--status-done-ink); }
  .status.待手術{ background:var(--status-surgery); color:var(--status-surgery-ink); }

  footer{ text-align:center; color:var(--muted); font-size:12px; padding:24px 0 40px; }
  .state{ text-align:center; color:var(--muted); font-size:14px; padding:40px 20px; }
</style>
</head>
<body>

<header>
  <a class="new-link" href="new.html">＋ 新增筆記</a>
  <h1>🩺 Vet_note 知識庫入口</h1>
  <p>藥物筆記・Case紀錄・日常心得・技術與判讀　｜　即時讀取 GitHub 內容</p>
</header>

<div class="search-wrap">
  <input id="search" type="text" placeholder="搜尋關鍵字，例如：Carprofen、食道狹窄、stay suture...">
</div>

<main id="main-root">
  <div class="state">載入中...</div>
</main>

<footer>內容即時讀取自 GitHub repo，新增/編輯筆記後這裡會自動出現，不用手動維護</footer>

<script>
const REPO = "yc-vetalk/yc-dvm-notes";
const RAW_BASE = `https://raw.githubusercontent.com/${REPO}/main/`;
const CATEGORY_ICON = {
  "手術筆記":"🔪", "麻醉筆記":"💉", "影像判讀":"🩻", "檢驗判讀":"🧪",
  "牙科":"🦷", "皮膚科":"🐾", "急診與重症照護":"🚑", "內科系統疾病":"🫀"
};
const TECH_ORDER = ["手術筆記","麻醉筆記","影像判讀","檢驗判讀","牙科","皮膚科","急診與重症照護","內科系統疾病"];
const DRUG_CAT_ORDER = ["腸胃用藥","抗生素","耳科用藥","止痛用藥"];

function resolveHref(path){
  return "note.html?path=" + encodeURIComponent(path);
}

function parseFrontmatter(text){
  const m = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
  if(!m) return { meta:{}, body:text };
  const meta = {};
  m[1].split("\n").forEach(line => {
    const idx = line.indexOf(":");
    if(idx === -1) return;
    meta[line.slice(0, idx).trim()] = line.slice(idx+1).trim();
  });
  return { meta, body: m[2] };
}

async function fetchTree(){
  const res = await fetch(`https://api.github.com/repos/${REPO}/git/trees/main?recursive=1`);
  if(!res.ok) throw new Error("tree fetch failed: " + res.status);
  const j = await res.json();
  return j.tree.filter(t => t.type === "blob" && t.path.endsWith(".md")
    && !t.path.startsWith("_") && !t.path.startsWith("99_索引"));
}

async function fetchNoteInfo(path){
  const filename = path.split("/").pop().replace(/\.md$/, "");
  try{
    const res = await fetch(RAW_BASE + path.split("/").map(encodeURIComponent).join("/") + "?_=" + Date.now(), { cache:"no-store" });
    const text = await res.text();
    const { meta, body } = parseFrontmatter(text);
    const h1m = body.match(/^#\s+(.+)$/m);
    const h1 = h1m ? h1m[1].trim() : "";
    const tagsRaw = meta["關鍵字"] || "";
    const tags = tagsRaw.replace(/[\[\]]/g,"").split(",").map(s=>s.trim()).filter(Boolean).slice(0,5);
    return {
      path,
      title: meta["主題"] || meta["藥名"] || filename,
      meta, tags, h1,
      desc: [meta["分類"], meta["適用情境"], meta["狀態"]].filter(Boolean).join(" · ")
    };
  }catch(e){
    return { path, title: filename, meta:{}, tags:[], h1:"", desc:"" };
  }
}

function cardHtml(item){
  return `<a class="card" href="${resolveHref(item.path)}" target="_blank">
    <div class="title">${item.title}</div>
    <div class="desc">${item.desc || item.path}</div>
    <div class="tags">${item.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
  </a>`;
}

function matchFilter(item, f){
  if(!f) return true;
  return (item.title + item.desc + item.tags.join(",") + item.path).toLowerCase().includes(f);
}

function subcatHtml(name, notes, filter){
  const filtered = notes.filter(n => matchFilter(n, filter));
  if(filter && filtered.length === 0) return "";
  const label = name ? `<div class="subcat-label">${name}<span class="n">(${filtered.length})</span></div>` : "";
  const body = filtered.length
    ? `<div class="grid">${filtered.map(cardHtml).join("")}</div>`
    : `<div class="empty-hint">尚無筆記，之後新增後會顯示於此</div>`;
  return `<div class="subcat">${label}${body}</div>`;
}

function orderedKeys(obj, preferredOrder){
  const keys = Object.keys(obj);
  const ordered = preferredOrder.filter(k => keys.includes(k));
  const extra = keys.filter(k => !preferredOrder.includes(k)).sort();
  return [...ordered, ...extra];
}

let ALL = { cases:[], drugDatabase:null, drugCat:{}, techGroups:{}, daily:[] };

function render(filter){
  const f = (filter||"").trim().toLowerCase();
  const root = document.getElementById("main-root");
  let html = "";

  // Case 進度總覽
  const cases = ALL.cases.filter(c => matchFilter(c, f));
  html += `<section class="major-section"><h2>📋 Case 進度總覽</h2>
    <table><thead><tr><th>物種</th><th>姓名</th><th>主要問題</th><th>狀態</th><th>建立日期</th></tr></thead>
    <tbody>${
      cases.length
        ? cases.map(c => `<tr onclick="location.href='${resolveHref(c.path)}'" style="cursor:pointer">
            <td>${c.meta["物種"]||""}</td><td>${c.meta["姓名"]||c.title}</td>
            <td>${(c.h1.split(" - ")[1]||c.h1)}</td>
            <td><span class="status ${c.meta["狀態"]||""}">${c.meta["狀態"]||"—"}</span></td>
            <td>${c.meta["日期建立"]||""}</td></tr>`).join("")
        : `<tr class="empty-row"><td colspan="5">尚無 Case，建立後會自動列於此</td></tr>`
    }</tbody></table></section>`;

  // 藥物筆記
  const dbMatch = !f || matchFilter({title:ALL.drugDatabase.title, desc:ALL.drugDatabase.desc, tags:ALL.drugDatabase.tags, path:""}, f);
  const drugCatHtml = orderedKeys(ALL.drugCat, DRUG_CAT_ORDER).map(cat => subcatHtml(cat, ALL.drugCat[cat], f)).filter(Boolean).join("")
    || (f ? "" : orderedKeys(ALL.drugCat, DRUG_CAT_ORDER).map(cat => subcatHtml(cat, ALL.drugCat[cat], "")).join(""));
  html += `<section class="major-section"><h2>💊 藥物筆記</h2>
    <p class="major-desc">藥物資料庫.xlsx 是唯一劑量計算來源；下方依類別記錄使用心得</p>
    <div class="subcat"><div class="subcat-label">速查資料庫</div>
      <div class="grid">${dbMatch ? `<a class="card" href="${ALL.drugDatabase.href}" target="_blank">
        <div class="title">${ALL.drugDatabase.title}</div><div class="desc">${ALL.drugDatabase.desc}</div>
        <div class="tags">${ALL.drugDatabase.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div></a>` : ""}</div>
    </div>
    ${drugCatHtml}</section>`;

  // 技術與判讀（依分類/子分類動態分組）
  const techKeys = orderedKeys(ALL.techGroups, TECH_ORDER);
  const techHtml = techKeys.map(cat => {
    const subGroups = ALL.techGroups[cat];
    const subHtml = Object.keys(subGroups).sort().map(sub => subcatHtml(sub || "筆記", subGroups[sub], f)).filter(Boolean).join("");
    if(f && !subHtml) return "";
    const finalSub = subHtml || Object.keys(subGroups).sort().map(sub => subcatHtml(sub || "筆記", subGroups[sub], "")).join("");
    return `<div style="margin-top:28px;">
      <h2 style="font-size:17px; margin-bottom:2px;">${CATEGORY_ICON[cat]||"📁"} ${cat}</h2>
      ${finalSub}
    </div>`;
  }).filter(Boolean).join("");
  html += `<section class="major-section">${techHtml || `<div class="empty-hint">沒有符合的技術與判讀筆記</div>`}</section>`;

  // 日常心得
  const daily = ALL.daily.filter(n => matchFilter(n, f));
  html += `<section class="major-section"><h2>📝 日常心得</h2>
    <div class="grid">${daily.length ? daily.map(cardHtml).join("") : `<div class="empty-hint">沒有符合的心得筆記</div>`}</div></section>`;

  root.innerHTML = html;
}

async function loadAll(){
  try{
    const files = await fetchTree();
    const infos = await Promise.all(files.map(f => fetchNoteInfo(f.path)));

    ALL.drugDatabase = { title:"💊 藥物劑量計算機（網頁版）", href:"drug.html",
      desc:"直接在網頁輸入體重自動算出各藥劑量，不用下載", tags:["劑量計算機"] };

    infos.forEach(i => {
      if(i.path.startsWith("02_Case紀錄/")) ALL.cases.push(i);
      else if(i.path.startsWith("01_藥物筆記/依類別用藥筆記/")){
        const cat = i.path.split("/")[2];
        (ALL.drugCat[cat] = ALL.drugCat[cat] || []).push(i);
      } else if(i.path.startsWith("04_技術與判讀/")){
        const segs = i.path.split("/");
        const cat = segs[1];
        const sub = segs.length > 3 ? segs[2] : "";
        ALL.techGroups[cat] = ALL.techGroups[cat] || {};
        (ALL.techGroups[cat][sub] = ALL.techGroups[cat][sub] || []).push(i);
      } else if(i.path.startsWith("03_日常概念與心得/")){
        ALL.daily.push(i);
      }
    });

    render();
  }catch(e){
    document.getElementById("main-root").innerHTML = `<div class="state">讀取失敗：${e.message}<br>可能是 GitHub API 額度限制，稍後重新整理再試。</div>`;
  }
}

document.getElementById("search").addEventListener("input", e => render(e.target.value));
loadAll();
</script>

</body>
</html>
